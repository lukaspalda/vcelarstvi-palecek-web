<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Honeycomb cells -->
  <polygon points="20,40 26,36 32,40 32,48 26,52 20,48" fill="#6AB42D" opacity="0.9"/>
  <polygon points="32,40 38,36 44,40 44,48 38,52 32,48" fill="#5B9A2F" opacity="0.85"/>
  <polygon points="26,28 32,24 38,28 38,36 32,40 26,36" fill="#7BC53A" opacity="0.8"/>
  <!-- Bee body -->
  <ellipse cx="28" cy="18" rx="11" ry="8" fill="#E8A020" transform="rotate(-20 28 18)"/>
  <!-- Bee stripes -->
  <path d="M22,14 Q28,11 34,14" stroke="#1B1D23" stroke-width="2" fill="none"/>
  <path d="M21,18 Q28,15 35,18" stroke="#1B1D23" stroke-width="2" fill="none"/>
  <path d="M22,22 Q28,19 34,22" stroke="#1B1D23" stroke-width="2" fill="none"/>
  <!-- Bee wings -->
  <ellipse cx="20" cy="10" rx="6" ry="4" fill="rgba(255,255,255,0.6)" transform="rotate(-30 20 10)"/>
  <ellipse cx="28" cy="8" rx="5" ry="3.5" fill="rgba(255,255,255,0.5)" transform="rotate(-15 28 8)"/>
  <!-- Bee head -->
  <circle cx="37" cy="12" r="4.5" fill="#E8A020"/>
  <!-- Eye -->
  <circle cx="39" cy="11" r="1.2" fill="#1B1D23"/>
  <!-- Antenna -->
  <line x1="39" y1="8" x2="43" y2="4" stroke="#1B1D23" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="43" cy="3.5" r="1" fill="#1B1D23"/>
  <line x1="37" y1="8" x2="39" y2="3" stroke="#1B1D23" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="39" cy="2.5" r="1" fill="#1B1D23"/>
</svg>
